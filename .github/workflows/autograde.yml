name: Autograding
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Make the activity root importable so `from app.xxx import ...` resolves
  # whether student code is run as a script (`python app/main.py`) or as a
  # module (`python -m app.main`). Without this, absolute-package imports
  # like `from app.schemas import VALID_CATEGORIES` raise ModuleNotFoundError
  # when the script is invoked directly, because Python only puts the script's
  # own directory (app/) on sys.path, not the repository root. See Activity 3
  # and Activity 7 incident, 2026-04-14.
  PYTHONPATH: ${{ github.workspace }}
  AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
  AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
  AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
  AZURE_EMBEDDING_DEPLOYMENT: ${{ secrets.AZURE_EMBEDDING_DEPLOYMENT }}
  AZURE_AI_SEARCH_ENDPOINT: ${{ secrets.AZURE_AI_SEARCH_ENDPOINT }}
  AZURE_AI_SEARCH_KEY: ${{ secrets.AZURE_AI_SEARCH_KEY }}
  AZURE_CONTENT_SAFETY_ENDPOINT: ${{ secrets.AZURE_CONTENT_SAFETY_ENDPOINT }}
  AZURE_CONTENT_SAFETY_KEY: ${{ secrets.AZURE_CONTENT_SAFETY_KEY }}
  AZURE_AI_LANGUAGE_ENDPOINT: ${{ secrets.AZURE_AI_LANGUAGE_ENDPOINT }}
  AZURE_AI_LANGUAGE_KEY: ${{ secrets.AZURE_AI_LANGUAGE_KEY }}
  STUDENT_CORPUS_SEED: ${{ github.actor }}

jobs:
  grade:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env file for autograder
        shell: bash
        run: |
          {
            echo "AZURE_OPENAI_ENDPOINT=$AZURE_OPENAI_ENDPOINT"
            echo "AZURE_OPENAI_API_KEY=$AZURE_OPENAI_API_KEY"
            echo "AZURE_OPENAI_DEPLOYMENT=$AZURE_OPENAI_DEPLOYMENT"
            echo "AZURE_EMBEDDING_DEPLOYMENT=$AZURE_EMBEDDING_DEPLOYMENT"
            echo "AZURE_AI_SEARCH_ENDPOINT=$AZURE_AI_SEARCH_ENDPOINT"
            echo "AZURE_AI_SEARCH_KEY=$AZURE_AI_SEARCH_KEY"
            echo "AZURE_CONTENT_SAFETY_ENDPOINT=$AZURE_CONTENT_SAFETY_ENDPOINT"
            echo "AZURE_CONTENT_SAFETY_KEY=$AZURE_CONTENT_SAFETY_KEY"
            echo "AZURE_AI_LANGUAGE_ENDPOINT=$AZURE_AI_LANGUAGE_ENDPOINT"
            echo "AZURE_AI_LANGUAGE_KEY=$AZURE_AI_LANGUAGE_KEY"
            echo "STUDENT_CORPUS_SEED=$STUDENT_CORPUS_SEED"
          } > .env

      - name: Run student code
        run: python app/main.py
        continue-on-error: true

      - name: Clone autograder
        uses: actions/checkout@v4
        with:
          repository: Tech901/ai102-autograder-tests
          token: ${{ secrets.AUTOGRADER_PAT }}
          path: .autograder

      # --- 34 tests, 100 points ---
      - name: "test_canary_text_intake_populated"
        id: test1
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "test_canary_text_intake_populated"
          command: "python -m pytest .autograder/activity08-memphis-311-platform/test_hidden.py::test_canary_text_intake_populated -v --tb=short"
          timeout: "5"
          max-score: "3"

      - name: "test_canary_safety_blocks_injection"
