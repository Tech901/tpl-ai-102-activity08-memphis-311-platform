<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" role="img" aria-labelledby="title desc">
  <title id="title">Agent Routing with Function Calling</title>
  <desc id="desc">Workflow diagram showing how the Memphis 311 routing agent uses Azure OpenAI function calling to analyze citizen input and dispatch to the correct pipeline: NLP, Vision, or RAG.</desc>

  <defs>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1E1E"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="amberBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFBF3B"/>
      <stop offset="100%" stop-color="#E5A530"/>
    </linearGradient>
    <linearGradient id="blueBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2D5A94"/>
      <stop offset="100%" stop-color="#1E3F6B"/>
    </linearGradient>
    <linearGradient id="greenBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8DC63F"/>
      <stop offset="100%" stop-color="#6FA832"/>
    </linearGradient>
    <linearGradient id="underlineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFBF3B"/>
      <stop offset="100%" stop-color="#E5A530"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrowAmber" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#FFBF3B"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#2D5A94"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#8DC63F"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" rx="6" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="18" font-weight="bold" fill="#FAFAFA">Agent Routing with Function Calling</text>
  <rect x="290" y="38" width="320" height="3" rx="1.5" fill="url(#underlineGrad)"/>

  <!-- Stage label -->
  <text x="25" y="66" font-family="Source Sans 3, Calibri, sans-serif" font-size="10" fill="#888">STEP 4: LLM-DRIVEN PIPELINE SELECTION (AI-102 D3.1)</text>

  <!-- ===== ROW 1: Input → Azure OpenAI → Parse Response ===== -->

  <!-- Node: CITIZEN INPUT -->
  <g filter="url(#shadow)">
    <rect x="20" y="78" width="145" height="85" rx="5" fill="url(#boxGrad)" stroke="#333" stroke-width="1"/>
    <rect x="20" y="78" width="4" height="85" rx="2" fill="url(#amberBar)"/>
  </g>
  <text x="92" y="103" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#FFBF3B">CITIZEN INPUT</text>
  <line x1="36" y1="113" x2="149" y2="113" stroke="#333" stroke-width="1"/>
  <text x="92" y="130" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Citizen message</text>
  <text x="92" y="143" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">or image file path</text>

  <!-- Arrow 1 -->
  <line x1="165" y1="120" x2="195" y2="120" stroke="#FFBF3B" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
  <text x="180" y="111" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#888" font-style="italic">prompt</text>

  <!-- Node: AZURE OPENAI -->
  <g filter="url(#shadow)">
    <rect x="205" y="78" width="210" height="85" rx="5" fill="url(#boxGrad)" stroke="#333" stroke-width="1"/>
    <rect x="205" y="78" width="4" height="85" rx="2" fill="url(#blueBar)"/>
  </g>
  <text x="310" y="103" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#2D5A94">AZURE OPENAI</text>
  <line x1="221" y1="113" x2="399" y2="113" stroke="#333" stroke-width="1"/>
  <text x="310" y="130" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">GPT-4o + AGENT_SYSTEM_MESSAGE</text>
  <text x="310" y="143" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">tools = TOOL_DEFINITIONS</text>

  <!-- Arrow 2 -->
  <line x1="415" y1="120" x2="445" y2="120" stroke="#2D5A94" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="430" y="111" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#888" font-style="italic">tool_calls</text>

  <!-- Node: PARSE RESPONSE -->
  <g filter="url(#shadow)">
    <rect x="455" y="78" width="175" height="85" rx="5" fill="url(#boxGrad)" stroke="#333" stroke-width="1"/>
    <rect x="455" y="78" width="4" height="85" rx="2" fill="url(#greenBar)"/>
  </g>
  <text x="542" y="103" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#8DC63F">PARSE RESPONSE</text>
  <line x1="471" y1="113" x2="614" y2="113" stroke="#333" stroke-width="1"/>
  <text x="542" y="130" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">tool_calls[0].function</text>
  <text x="542" y="143" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Extract name + arguments</text>

  <!-- Side annotation: tool count -->
  <g filter="url(#shadow)">
    <rect x="660" y="85" width="130" height="70" rx="5" fill="url(#boxGrad)" stroke="#555" stroke-width="1" stroke-dasharray="4,2"/>
    <rect x="660" y="85" width="4" height="70" rx="2" fill="url(#amberBar)"/>
  </g>
  <text x="725" y="106" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="10" font-weight="bold" fill="#FFBF3B">3 TOOL SCHEMAS</text>
  <text x="725" y="121" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="8" fill="#CCC">process_text_complaint</text>
  <text x="725" y="133" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="8" fill="#CCC">process_inspection_photo</text>
  <text x="725" y="145" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="8" fill="#CCC">answer_citizen_question</text>

  <!-- Dashed connector: tool schemas → Azure OpenAI -->
  <line x1="660" y1="120" x2="630" y2="120" stroke="#555" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ===== Arrow down from Parse → Decision ===== -->
  <line x1="542" y1="163" x2="542" y2="178" stroke="#8DC63F" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- ===== Decision Diamond ===== -->
  <polygon points="542,185 600,210 542,235 484,210" fill="url(#boxGrad)" stroke="#8DC63F" stroke-width="1.5"/>
  <text x="542" y="208" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="9" font-weight="bold" fill="#8DC63F">execute</text>
  <text x="542" y="219" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="9" font-weight="bold" fill="#8DC63F">_tool()</text>

  <!-- ===== Fan-out arrows: Diamond → Pipeline functions ===== -->
  <line x1="505" y1="218" x2="225" y2="253" stroke="#2D5A94" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="542" y1="235" x2="420" y2="253" stroke="#FFBF3B" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
  <line x1="579" y1="218" x2="640" y2="253" stroke="#8DC63F" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Fan-out labels -->
  <text x="340" y="234" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#2D5A94" font-weight="600">complaint</text>
  <text x="475" y="248" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#FFBF3B" font-weight="600">photo</text>
  <text x="622" y="234" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#8DC63F" font-weight="600">question</text>

  <!-- ===== ROW 3: Pipeline function boxes ===== -->

  <!-- process_text_complaint -->
  <g filter="url(#shadow)">
    <rect x="80" y="265" width="195" height="58" rx="5" fill="url(#boxGrad)" stroke="#333" stroke-width="1"/>
    <rect x="80" y="265" width="4" height="58" rx="2" fill="url(#blueBar)"/>
  </g>
  <text x="177" y="286" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="10" font-weight="bold" fill="#2D5A94">process_text_complaint()</text>
  <text x="177" y="302" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">&#x2192; NLP Pipeline (PII, Sentiment, Intent)</text>

  <!-- process_inspection_photo -->
  <g filter="url(#shadow)">
    <rect x="310" y="265" width="210" height="58" rx="5" fill="url(#boxGrad)" stroke="#333" stroke-width="1"/>
    <rect x="310" y="265" width="4" height="58" rx="2" fill="url(#amberBar)"/>
  </g>
  <text x="415" y="286" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="10" font-weight="bold" fill="#FFBF3B">process_inspection_photo()</text>
  <text x="415" y="302" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">&#x2192; Vision Pipeline (Classify, Describe)</text>

  <!-- answer_citizen_question -->
  <g filter="url(#shadow)">
    <rect x="555" y="265" width="205" height="58" rx="5" fill="url(#boxGrad)" stroke="#333" stroke-width="1"/>
    <rect x="555" y="265" width="4" height="58" rx="2" fill="url(#greenBar)"/>
  </g>
  <text x="657" y="286" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="10" font-weight="bold" fill="#8DC63F">answer_citizen_question()</text>
  <text x="657" y="302" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">&#x2192; RAG Pipeline (Search, Ground, Cite)</text>

  <!-- ===== LEGEND ===== -->
  <rect x="30" y="338" width="840" height="42" rx="4" fill="#111111" stroke="#222" stroke-width="1"/>

  <!-- AI-102 Badge -->
  <rect x="46" y="346" width="55" height="22" rx="4" fill="url(#blueBar)"/>
  <text x="73" y="361" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="9" font-weight="700" fill="#FFF">AI-102</text>

  <!-- Concepts -->
  <text x="116" y="356" font-family="Syne, Calibri, sans-serif" font-size="10" font-weight="600" fill="#FFBF3B">Concepts:</text>
  <text x="116" y="370" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#999">Function Calling  |  Tool Selection  |  Agent Routing  |  Multi-turn Conversation</text>

  <!-- Objective -->
  <text x="590" y="356" font-family="Syne, Calibri, sans-serif" font-size="10" font-weight="600" fill="#8DC63F">Objective:</text>
  <text x="590" y="370" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#999">D3.1 &#x2014; Create custom agents</text>

  <!-- Tech901 watermark -->
  <text x="854" y="372" text-anchor="end" font-family="Syne, Calibri, sans-serif" font-size="9" font-weight="700" fill="#333">TECH901</text>
</svg>